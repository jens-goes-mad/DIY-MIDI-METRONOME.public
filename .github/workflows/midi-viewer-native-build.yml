name: Build MIDI Viewer (native)

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -S software/midi-viewer-native -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - uses: actions/upload-artifact@v4
        with:
          name: midi-viewer-macos-arm64
          path: build/midi_viewer_app

  macos-x86_64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -S software/midi-viewer-native -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - uses: actions/upload-artifact@v4
        with:
          name: midi-viewer-macos-x86_64
          path: build/midi_viewer_app

  linux-x86_64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libasound2-dev pkg-config

      - name: Configure
        run: cmake -B build -S software/midi-viewer-native -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - uses: actions/upload-artifact@v4
        with:
          name: midi-viewer-linux-x86_64
          path: build/midi_viewer_app

  windows-x86_64:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -S software/midi-viewer-native -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - uses: actions/upload-artifact@v4
        with:
          name: midi-viewer-windows-x86_64
          path: build/Release/midi_viewer_app.exe
