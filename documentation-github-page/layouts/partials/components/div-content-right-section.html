<p>
{{ if .Params.ShortSummary }}
    {{ .Params.ShortSummary }}
{{ else }}
    {{ with .Params.links }}
        {{ range . }}
            {{ $link := . }}
            {{ if $link.title }}
                {{ $link.title }}
            {{ else }}
                {{ $link.description | default "No description" }}
            {{ end }}
        {{ end }}
    {{ else }}
        {{ .Summary }}
    {{ end }}
{{ end }}
</p>
